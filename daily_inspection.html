<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.I. - Daily Jobsite Inspection Checklist</title>
    
    <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22:%22Daily%20Jobsite%20Inspection%20Checklist%22,%22short_name%22:%22Jobsite%20Inspection%22,%22start_url%22:%22./%22,%22display%22:%22standalone%22,%22background_color%22:%22%23020617%22,%22theme_color%22:%22%23f59e0b%22%7D">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        construction: {
                            gold: '#F59E0B',
                            darkGold: '#D97706',
                            utilityRed: '#EF4444',
                            utilityBlue: '#3B82F6',
                            utilityGreen: '#10B981'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a !important;
            color: #f1f5f9 !important;
        }
        input, select, textarea {
            background-color: #0f172a !important;
            color: #f1f5f9 !important;
            border-color: #1e293b !important;
        }
        canvas { touch-action: none; }
        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            input, select, textarea {
                border-bottom: 1px solid #000 !important;
                background: transparent !important;
                color: black !important;
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col">
    
    <!-- Header -->
    <header class="no-print bg-gray-950 border-b border-gray-800 px-4 py-3 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-amber-500 rounded text-gray-950 font-bold">J.I.</div>
                <div>
                    <h1 class="text-lg font-bold text-amber-500">Jobsite Daily Safety Portal</h1>
                    <p class="text-xs text-gray-400">Excavation &amp; Underground Pipe Installation</p>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="toggleLanguage()" class="px-3 py-1 bg-gray-800 hover:bg-gray-700 text-xs font-semibold rounded border border-gray-700">
                    <span id="langBtn">ESPAÑOL</span>
                </button>
                <button onclick="saveToLocal()" class="px-3 py-1 bg-gray-800 hover:bg-gray-700 text-xs font-semibold rounded border border-gray-700">
                    ✔ Save
                </button>
                <button onclick="exportJSON()" class="px-3 py-1 bg-gray-800 hover:bg-gray-700 text-xs font-semibold rounded border border-gray-700">
                    ⬇ Export
                </button>
                <button onclick="window.print()" class="px-3 py-1 bg-amber-500 hover:bg-amber-600 text-gray-950 text-xs font-bold rounded">
                    Print
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl w-full mx-auto p-4">
        <section class="bg-gray-950 border border-gray-800 rounded-lg p-5 shadow-lg">
            <h2 class="text-base font-bold text-gray-100 mb-4">Daily Jobsite Inspection Checklist</h2>

            <form id="inspectionForm" class="space-y-4" onsubmit="return false;">
                
                <!-- 1. General Information -->
                <div>
                    <h3 class="text-sm font-bold text-amber-500 uppercase mb-3">1. General Information</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Project Name</label>
                            <input type="text" id="projName" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Location</label>
                            <input type="text" id="jobLocation" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Date</label>
                            <input type="date" id="inspectDate" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Time</label>
                            <input type="time" id="inspectTime" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Inspector</label>
                            <input type="text" id="inspector" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Superintendent</label>
                            <input type="text" id="superintendent" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs">
                        </div>
                    </div>
                </div>

                <!-- 2. Excavation Details -->
                <div>
                    <h3 class="text-sm font-bold text-amber-500 uppercase mb-3">2. Excavation Details</h3>
                    <div class="grid grid-cols-3 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Max Depth (ft)</label>
                            <input type="text" id="maxDepth" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Max Width (ft)</label>
                            <input type="text" id="maxWidth" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Soil Type</label>
                            <select id="soilType" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs">
                                <option value="Type A">Type A</option>
                                <option value="Type B">Type B</option>
                                <option value="Type C">Type C</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 3. Safety Checklist -->
                <div>
                    <h3 class="text-sm font-bold text-amber-500 uppercase mb-3">3. Safety Checklist</h3>
                    <div class="bg-gray-950 border border-gray-800 rounded overflow-hidden">
                        <div class="grid grid-cols-12 bg-gray-900 border-b border-gray-800 p-2 text-xs font-bold">
                            <div class="col-span-8">Item</div>
                            <div class="col-span-4 grid grid-cols-3 text-center">
                                <span class="text-green-500">OK</span>
                                <span>N/A</span>
                                <span class="text-red-500">D</span>
                            </div>
                        </div>
                        <div id="checklistContainer" class="max-h-96 overflow-y-auto"></div>
                    </div>
                </div>

                <!-- 4. Notes -->
                <div>
                    <h3 class="text-sm font-bold text-amber-500 uppercase mb-3">4. Notes &amp; Observations</h3>
                    <textarea id="observations" rows="3" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs" placeholder="Enter observations..."></textarea>
                </div>

                <!-- 5. Signature -->
                <div>
                    <h3 class="text-sm font-bold text-amber-500 uppercase mb-3">5. Signature</h3>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Printed Name</label>
                            <input type="text" id="printSignName" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">Date</label>
                            <input type="date" id="signDate" class="w-full bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs">
                        </div>
                    </div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">Signature</label>
                    <div class="border border-gray-800 bg-gray-950 rounded h-20 relative">
                        <canvas id="sigCanvas" class="w-full h-full absolute inset-0" width="400" height="80"></canvas>
                    </div>
                    <button type="button" onclick="clearSig()" class="mt-1 text-xs text-red-500 font-bold hover:underline">Clear</button>
                </div>

            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer class="no-print bg-gray-950 border-t border-gray-800 px-4 py-3 text-xs text-center text-gray-400">
        <span>OSHA 1926 Subpart P Compliance - Local Data Layer Isolation</span>
    </footer>

    <script>
        let currentLanguage = 'en';
        let checklistState = {};
        let isSigning = false;

        const checklist = [
            { en: "Excavation walls stable?", es: "¿Paredes estables?" },
            { en: "Safe access/egress?", es: "¿Acceso seguro?" },
            { en: "Spoil piles 2 ft from edge?", es: "¿Pilas a 2 pies?" },
            { en: "Underground utilities marked?", es: "¿Servicios marcados?" },
            { en: "Overhead utilities clearances?", es: "¿Distancias aéreas?" },
            { en: "Hazardous atmosphere tested?", es: "¿Atmósfera probada?" },
            { en: "Ventilation adequate?", es: "¿Ventilación adecuada?" },
            { en: "Fall protection installed?", es: "¿Protección contra caídas?" },
            { en: "Traffic control in place?", es: "¿Control de tráfico?" },
            { en: "Workers using PPE?", es: "¿Equipos de seguridad?" },
            { en: "Competent person on site?", es: "¿Persona competente?" },
            { en: "Emergency equipment available?", es: "¿Equipo de emergencia?" },
            { en: "Confined space procedures?", es: "¿Procedimientos de espacio?" },
            { en: "Heavy equipment safe?", es: "¿Maquinaria segura?" },
            { en: "Trench box installed?", es: "¿Caja de zanja?" },
            { en: "Water accumulation controlled?", es: "¿Agua controlada?" },
            { en: "Equipment inspected daily?", es: "¿Equipo inspeccionado?" },
            { en: "Hand tools good condition?", es: "¿Herramientas buenas?" },
            { en: "Lifting equipment inspected?", es: "¿Equipo de izaje?" },
            { en: "Electrical tools grounded?", es: "¿Herramientas conectadas?" },
            { en: "Pipe stored securely?", es: "¿Tubería segura?" },
            { en: "Pipe lifting procedures?", es: "¿Procedimientos de tubería?" },
            { en: "Trench bedding prepared?", es: "¿Cama preparada?" },
            { en: "Backfill appropriate?", es: "¿Relleno correcto?" }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            document.getElementById('inspectDate').valueAsDate = today;
            document.getElementById('signDate').valueAsDate = today;
            document.getElementById('inspectTime').value = today.toTimeString().slice(0, 5);

            initChecklist();
            setupSignature();
            loadFromLocal();
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            }
        });

        function initChecklist() {
            const container = document.getElementById('checklistContainer');
            checklist.forEach((item, idx) => {
                const row = document.createElement('div');
                row.className = 'grid grid-cols-12 p-2 border-b border-gray-800 hover:bg-gray-900/50';
                row.innerHTML = `
                    <div class="col-span-8 text-xs">${currentLanguage === 'en' ? item.en : item.es}</div>
                    <div class="col-span-4 grid grid-cols-3 gap-1">
                        <button type="button" onclick="setStatus(${idx}, 'OK')" id="ok-${idx}" class="py-1 text-xs rounded border border-gray-700 hover:bg-green-900 text-green-500">✓</button>
                        <button type="button" onclick="setStatus(${idx}, 'N/A')" id="na-${idx}" class="py-1 text-xs rounded border border-gray-700 hover:bg-gray-800">–</button>
                        <button type="button" onclick="setStatus(${idx}, 'D')" id="d-${idx}" class="py-1 text-xs rounded border border-gray-700 hover:bg-red-900 text-red-500">✗</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function setStatus(idx, status) {
            checklistState[idx] = status;
            ['OK', 'N/A', 'D'].forEach(s => {
                const btn = document.getElementById(`${s.toLowerCase()}-${idx}`);
                if (s === status) {
                    btn.className = `py-1 text-xs rounded font-bold ${s === 'OK' ? 'bg-green-900 text-green-400 border-green-600' : s === 'D' ? 'bg-red-900 text-red-400 border-red-600' : 'bg-gray-800 border-gray-600'}`;
                } else {
                    btn.className = 'py-1 text-xs rounded border border-gray-700 hover:bg-gray-800';
                }
            });
        }

        function setupSignature() {
            const canvas = document.getElementById('sigCanvas');
            const ctx = canvas.getContext('2d');
            canvas.addEventListener('pointerdown', () => { isSigning = true; });
            canvas.addEventListener('pointermove', (e) => {
                if (!isSigning) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                ctx.lineTo(x, y);
                ctx.stroke();
            });
            canvas.addEventListener('pointerup', () => { isSigning = false; });
        }

        function clearSig() {
            const canvas = document.getElementById('sigCanvas');
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }

        function toggleLanguage() {
            currentLanguage = currentLanguage === 'en' ? 'es' : 'en';
            document.getElementById('langBtn').textContent = currentLanguage === 'en' ? 'ESPAÑOL' : 'ENGLISH';
            initChecklist();
        }

        function saveToLocal() {
            const data = {
                projName: document.getElementById('projName').value,
                jobLocation: document.getElementById('jobLocation').value,
                inspectDate: document.getElementById('inspectDate').value,
                inspectTime: document.getElementById('inspectTime').value,
                inspector: document.getElementById('inspector').value,
                superintendent: document.getElementById('superintendent').value,
                maxDepth: document.getElementById('maxDepth').value,
                maxWidth: document.getElementById('maxWidth').value,
                soilType: document.getElementById('soilType').value,
                observations: document.getElementById('observations').value,
                printSignName: document.getElementById('printSignName').value,
                signDate: document.getElementById('signDate').value,
                checklist: checklistState
            };
            localStorage.setItem('jisafety', JSON.stringify(data));
            alert('Data saved to browser cache!');
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('jisafety');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('projName').value = data.projName || '';
                document.getElementById('jobLocation').value = data.jobLocation || '';
                document.getElementById('inspectDate').value = data.inspectDate || '';
                document.getElementById('inspectTime').value = data.inspectTime || '';
                document.getElementById('inspector').value = data.inspector || '';
                document.getElementById('superintendent').value = data.superintendent || '';
                document.getElementById('maxDepth').value = data.maxDepth || '';
                document.getElementById('maxWidth').value = data.maxWidth || '';
                document.getElementById('soilType').value = data.soilType || '';
                document.getElementById('observations').value = data.observations || '';
                document.getElementById('printSignName').value = data.printSignName || '';
                document.getElementById('signDate').value = data.signDate || '';
                checklistState = data.checklist || {};
                Object.keys(checklistState).forEach(idx => {
                    if (checklistState[idx]) setStatus(parseInt(idx), checklistState[idx]);
                });
            }
        }

        function exportJSON() {
            saveToLocal();
            const data = {
                projectInformation: {
                    projName: document.getElementById('projName').value,
                    jobLocation: document.getElementById('jobLocation').value,
                    inspectDate: document.getElementById('inspectDate').value,
                    inspectTime: document.getElementById('inspectTime').value,
                    inspector: document.getElementById('inspector').value,
                    superintendent: document.getElementById('superintendent').value
                },
                excavationDetails: {
                    maxDepth: document.getElementById('maxDepth').value,
                    maxWidth: document.getElementById('maxWidth').value,
                    soilType: document.getElementById('soilType').value
                },
                checklist: checklistState,
                observations: document.getElementById('observations').value,
                signatureBlock: {
                    printSignName: document.getElementById('printSignName').value,
                    signDate: document.getElementById('signDate').value
                }
            };
            const link = document.createElement('a');
            link.href = 'data:application/json,' + JSON.stringify(data, null, 2);
            link.download = `safety_inspection_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        }
    </script>
</body>
</html>
